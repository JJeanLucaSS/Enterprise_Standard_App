<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Arctic Flow - Technician Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#89f5e7",
                        "secondary-fixed-dim": "#b9c7df",
                        "tertiary-fixed-dim": "#6bd8cb",
                        "surface-container": "#e6eeff",
                        "secondary-container": "#d5e3fc",
                        "on-surface-variant": "#424752",
                        "inverse-surface": "#233144",
                        "primary-fixed": "#d6e3ff",
                        "tertiary-container": "#006b62",
                        "on-error": "#ffffff",
                        "surface-dim": "#ccdbf4",
                        "surface-bright": "#f8f9ff",
                        "inverse-primary": "#a9c7ff",
                        "on-primary-fixed": "#001b3d",
                        "surface-variant": "#d5e3fd",
                        "on-primary": "#ffffff",
                        "primary-container": "#005eb8",
                        "on-secondary-fixed": "#0d1c2e",
                        "outline-variant": "#c2c6d4",
                        "on-tertiary-fixed-variant": "#005049",
                        "on-secondary-fixed-variant": "#3a485b",
                        "on-secondary": "#ffffff",
                        "background": "#f8f9ff",
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#00468c",
                        "surface-tint": "#005db6",
                        "outline": "#727783",
                        "on-tertiary-container": "#7fecde",
                        "surface-container-low": "#eff4ff",
                        "on-background": "#0d1c2f",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#ebf1ff",
                        "surface-container-high": "#dde9ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#a9c7ff",
                        "on-tertiary-fixed": "#00201d",
                        "on-primary-container": "#c8daff",
                        "surface": "#f8f9ff",
                        "secondary-fixed": "#d5e3fc",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#0d1c2f",
                        "on-secondary-container": "#57657a",
                        "tertiary": "#00514a",
                        "surface-container-highest": "#d5e3fd",
                        "secondary": "#515f74",
                        "primary": "#00478d",
                        "on-error-container": "#93000a"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-thermal-gradient {
            background: linear-gradient(135deg, #00478d 0%, #005eb8 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<header class="w-full top-0 sticky bg-[#f8f9ff] flex items-center justify-center px-6 py-8 z-50">
<div class="flex flex-col items-center gap-2">
    <span class="material-symbols-outlined text-primary text-4xl" data-icon="ac_unit">ac_unit</span>
    <h1 class="text-[#00478d] font-black tracking-tighter text-2xl uppercase">THERMAL ARCHITECT</h1>
</div>
</header>
<main class="flex-1 flex flex-col px-8 pb-12 max-w-md mx-auto w-full justify-center">
<div class="mb-12">
<h2 class="text-on-background font-headline font-bold text-3xl leading-tight">Welcome back, Technician</h2>
<p class="text-on-surface-variant mt-2 text-lg">Arctic Flow diagnostic portal</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-medium uppercase tracking-widest text-on-surface-variant ml-1" for="employee-id">Employee ID / Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant" id="employee-id" placeholder="TECH-4402 or email@arctic.com" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-medium uppercase tracking-widest text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
<!--criar conta-->
<div class="flex justify-end">
    <a class="text-primary text-sm font-semibold hover:underline" href="criarconta.html">Criar Conta?</a>
</div>
</div>
<!--botao Entre-->
<div>
<a href="../home/home.html">
<button class="w-full bg-thermal-gradient text-white font-bold py-5 rounded-lg shadow-lg shadow-primary/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-lg" type="submit">
    Entre
    <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</a>
</div>
</form>
<div class="mt-12 flex flex-col items-center">
<div class="w-full flex items-center gap-4 mb-8">
<div class="h-px bg-outline-variant/30 flex-1"></div>
<span class="text-xs text-outline font-bold uppercase tracking-widest">Biometric Login</span>
<div class="h-px bg-outline-variant/30 flex-1"></div>
</div>
<button class="group flex flex-col items-center gap-3 transition-all active:scale-95">
<div class="w-20 h-20 rounded-2xl bg-surface-container-high flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors duration-300">
<span class="material-symbols-outlined text-4xl" data-icon="fingerprint">fingerprint</span>
</div>
<span class="text-sm font-semibold text-on-surface-variant">Use Fingerprint or FaceID</span>
</button>
</div>
</main>
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pb-8 pt-4 px-4 bg-white/80 backdrop-blur-xl shadow-[0_-4px_24px_rgba(13,28,47,0.06)] rounded-t-2xl border-t border-[#005eb8]/15 md:hidden">
<div class="flex flex-col items-center justify-center bg-[#dde9ff] text-[#00478d] rounded-xl px-6 py-2 transition-all duration-300 ease-in-out active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="login">login</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">Sign In</span>
</div>
<div class="flex flex-col items-center justify-center text-[#424752] opacity-70 hover:text-[#005eb8] transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined mb-1" data-icon="contact_support">contact_support</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-widest">Support</span>
</div>
</footer>
<div class="hidden md:flex fixed top-0 right-0 p-6 z-[60] gap-4">
<button class="text-on-surface-variant font-bold text-sm uppercase tracking-widest flex items-center gap-2 px-4 py-2 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="contact_support">contact_support</span>
            Support
        </button>
</div>
</body></html>
