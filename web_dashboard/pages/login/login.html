<script>
document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.querySelector('form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('email-error');
    const passwordError = document.getElementById('password-error');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const submitBtn = loginForm.querySelector('button[type="submit"]');

    // Função para mostrar erro
    const showError = (input, messageElement, message) => {
        input.classList.add('ring-2', 'ring-error/50', 'bg-error/5');
        messageElement.textContent = message;
        messageElement.classList.remove('hidden');
    };

    // Função para limpar erro
    const clearError = (input, messageElement) => {
        input.classList.remove('ring-2', 'ring-error/50', 'bg-error/5');
        messageElement.classList.add('hidden');
    };

    // Alternar visibilidade da senha
    togglePasswordBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        togglePasswordBtn.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
    });

    // Limpar erros ao digitar
    emailInput.addEventListener('input', () => clearError(emailInput, emailError));
    passwordInput.addEventListener('input', () => clearError(passwordInput, passwordError));

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        let isValid = true;

        // Validação de E-mail
        if (!emailInput.value) {
            showError(emailInput, emailError, 'O e-mail é obrigatório.');
            isValid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
            showError(emailInput, emailError, 'Insira um e-mail válido.');
            isValid = false;
        }

        // Validação de Senha
        if (!passwordInput.value) {
            showError(passwordInput, passwordError, 'A senha é obrigatória.');
            isValid = false;
        } else if (passwordInput.value.length < 6) {
            showError(passwordInput, passwordError, 'A senha deve ter pelo menos 6 caracteres.');
            isValid = false;
        }

        if (isValid) {
            // Feedback visual de carregamento
            const originalContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `Entrando...`; 
            
            console.log("Enviando para o servidor:", { email: emailInput.value });

            // Simulação de resposta
            async function carregarDados() {
                const resposta = await fetch("http://localhost:3000/login", {
                    method: "POST",
                    headers: {
                    "Content-Type": "application/json"
                    },
                body: JSON.stringify({
                email: email,
                senha: senha
                })
            });

                const dados = await resposta.json();
                console.log(dados);
            }
            carregarDados();
        }
    });
});
</script>
