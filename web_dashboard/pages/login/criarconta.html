<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .thermal-gradient {
            background: linear-gradient(135deg, #00478d 0%, #005eb8 100%);
        }
        .glass-panel {
            backdrop-filter: blur(12px);
        }
        .ghost-border {
            border: 1px solid rgba(194, 198, 212, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar - Map of JSON data -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm shadow-blue-900/5 flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="text-blue-700 dark:text-blue-400 active:scale-95 duration-200 p-2 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-inter headline-md font-bold text-slate-900 dark:text-slate-50 text-xl">Create Account</h1>
</div>
<div class="text-xl font-bold tracking-tight text-blue-800 dark:text-blue-300">
            THERMAL ARCHITECT
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-6 max-w-lg mx-auto w-full">
<!-- Brand Identity Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl thermal-gradient text-white mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">ac_unit</span>
</div>
<h2 class="text-3xl font-headline font-extrabold text-on-surface tracking-tight mb-2">Crie sua Conta</h2>
<p class="text-on-surface-variant text-sm font-medium">Cadastre-se para gerenciar sistemas de refrigeração.</p>
</div>
<!-- Registration Form - Bento Style Interaction -->
<div class="space-y-6">
<div class="grid grid-cols-1 gap-4">
<!-- Field Cluster 1: Personal Info -->
<div class="bg-surface-container-lowest p-5 rounded-xl ghost-border space-y-4 shadow-sm shadow-blue-900/5">
<div class="relative">
<label class="text-on-surface-variant text-xs font-semibold mb-1 block ml-1 uppercase tracking-wider">Nome Completo</label>
<div class="flex items-center bg-surface-container-low rounded-lg px-4 py-3 focus-within:ring-2 ring-primary/20 transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3 text-xl">person</span>
<input class="bg-transparent border-none focus:ring-0 p-0 w-full text-on-surface placeholder:text-outline/50 font-medium" placeholder="Ex: Roberto Silva" type="text"/>
</div>
</div>
<div class="relative">
<label class="text-on-surface-variant text-xs font-semibold mb-1 block ml-1 uppercase tracking-wider">E-mail Profissional</label>
<div class="flex items-center bg-surface-container-low rounded-lg px-4 py-3 focus-within:ring-2 ring-primary/20 transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3 text-xl">mail</span>
<input class="bg-transparent border-none focus:ring-0 p-0 w-full text-on-surface placeholder:text-outline/50 font-medium" placeholder="nome@empresa.com.br" type="email"/>
</div>
</div>
</div>
<!-- Field Cluster 2: Professional Details -->
<div class="bg-surface-container-lowest p-5 rounded-xl ghost-border space-y-4 shadow-sm shadow-blue-900/5">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="relative">
<label class="text-on-surface-variant text-xs font-semibold mb-1 block ml-1 uppercase tracking-wider">Telefone</label>
<div class="flex items-center bg-surface-container-low rounded-lg px-4 py-3 focus-within:ring-2 ring-primary/20 transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3 text-xl">call</span>
<input class="bg-transparent border-none focus:ring-0 p-0 w-full text-on-surface placeholder:text-outline/50 font-medium" placeholder="(11) 99999-9999" type="tel"/>
</div>
</div>
<div class="relative">
<label class="text-on-surface-variant text-xs font-semibold mb-1 block ml-1 uppercase tracking-wider">CPF</label>
<div class="flex items-center bg-surface-container-low rounded-lg px-4 py-3 focus-within:ring-2 ring-primary/20 transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3 text-xl">badge</span>
<input class="bg-transparent border-none focus:ring-0 p-0 w-full text-on-surface placeholder:text-outline/50 font-medium" placeholder="000.000.000-00" type="text"/>
</div>
</div>
</div>
<div class="relative">
<label class="text-on-surface-variant text-xs font-semibold mb-1 block ml-1 uppercase tracking-wider">Nome da Empresa</label>
<div class="flex items-center bg-surface-container-low rounded-lg px-4 py-3 focus-within:ring-2 ring-primary/20 transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3 text-xl">corporate_fare</span>
<input class="bg-transparent border-none focus:ring-0 p-0 w-full text-on-surface placeholder:text-outline/50 font-medium" placeholder="Ex: Ar Frio Sistemas Ltda" type="text"/>
</div>
</div>
</div>
</div>
<!-- Action Area -->
<div class="pt-4 flex flex-col items-center gap-6">
<button class="w-full thermal-gradient text-white py-4 rounded-lg font-bold text-lg shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Criar Conta
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<a class="text-primary font-semibold hover:text-primary-container transition-colors flex items-center gap-1 group" href="#">
                    Já tenho uma conta? <span class="underline decoration-primary/30 group-hover:decoration-primary">Faça Login</span>
</a>
</div>
</div>
<!-- Atmospheric Visual Element -->
<div class="mt-12 opacity-40">
<div class="flex justify-between items-end h-16 gap-2">
<div class="w-2 bg-primary/20 rounded-t-full h-1/2"></div>
<div class="w-2 bg-primary/30 rounded-t-full h-3/4"></div>
<div class="w-2 bg-primary/40 rounded-t-full h-full"></div>
<div class="w-2 bg-primary/20 rounded-t-full h-1/3"></div>
<div class="w-2 bg-primary/10 rounded-t-full h-1/2"></div>
<div class="w-2 bg-primary/40 rounded-t-full h-2/3"></div>
<div class="w-2 bg-primary/20 rounded-t-full h-1/4"></div>
<div class="w-2 bg-primary/30 rounded-t-full h-3/4"></div>
<div class="w-2 bg-primary/50 rounded-t-full h-full"></div>
</div>
<p class="text-[10px] text-center text-on-surface-variant mt-2 font-label tracking-widest uppercase">System Flux Monitor</p>
</div>
</main>
<!-- BottomNavBar - Map of JSON data -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-safe h-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-slate-200/15 dark:border-slate-800/15 shadow-[0_-4px_12px_rgba(13,28,47,0.06)] z-50 rounded-t-2xl">
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-6 py-1 active:scale-90 duration-200 cursor-pointer group">
<span class="material-symbols-outlined group-hover:text-blue-600" data-icon="login">login</span>
<span class="font-inter label-md font-medium text-xs mt-1">Login</span>
</div>
<!-- Support Active by context of needing help during signup -->
<div class="flex flex-col items-center justify-center bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-100 rounded-xl px-6 py-1 active:scale-90 duration-200 cursor-pointer">
<span class="material-symbols-outlined" data-icon="contact_support">contact_support</span>
<span class="font-inter label-md font-medium text-xs mt-1">Support</span>
</div>
</nav>
<!-- Abstract background decorations -->
<div class="fixed top-0 right-0 -z-10 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-64 h-64 bg-tertiary/5 blur-[100px] rounded-full"></div>
</body></html>
