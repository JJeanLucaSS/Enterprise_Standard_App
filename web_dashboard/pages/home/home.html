<!doctype html>
<html class="light" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jhon Tech Architect - Inovação em Refrigeração</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/input.css" />

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              color1: "#3785e5",
              color2: "#89a7b1",
              color3: "#566981",
              color4: "#4440a4",
              color5: "#34344e",
              gren: "#30f508",
              red:"#f60e27",
              blue: "#2f05ff",
              orange: "#f6b50e",
              black:"#0000000",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-color2 font-body text-on-surface min-h-screen pb-32">
    <!-- TopAppBar -->
    <header
      class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none flex justify-between items-center px-6 py-4 w-full"
    >
      <div class="flex items-center gap-3">
        <a href="home.html" class="flex items-center gap-3">
          <span
            class="material-symbols-outlined text-blue dark:black"
            >ac_unit</span
          >
          <h1
            class="Manrope headline-md font-bold tracking-tight text-xl font-extrabold tracking-tighter text-color5 dark:text-blue-300">
            Jhon Tech Architect
          </h1>
        </a>
      </div>
      <div class="relative group">
        <div
          class="absolute inset-y-0 left-4 flex items-center pointer-events-none"
        >
          <span class="material-symbols-outlined text-outline">search</span>
        </div>
        <input
          class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary transition-all text-on-surface"
          placeholder="Search for cooling or electrical services..."
          type="text"
        />
      </div>
      <div class="flex items-center gap-4">
        <button
          class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-150"
        >
          <span
            class="material-symbols-outlined text-slate-500 dark:text-slate-400"
            >notifications</span
          >
        </button>
      </div>
    </header>
    <main class="pt-24 px-6 max-w-7xl mx-auto">
      <!-- Search & Hero -->
      <section class="mb-12">
        <div class="mb-8">
          <h2
            class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-on-background">
            Engenheiro <span class="text-primary">Web</span>
          </h2>
        </div>
      </section>
      <!-- Service Categories -->
      <section class="mb-12">
        <div class="flex justify-between items-end mb-6">
          <h3 class="font-headline text-2xl font-bold">Sistema</h3>
          <span class="text-primary text-sm font-semibold">Veja Catalogo</span>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <!-- AC Service -->
          <div class="bg-color4 p-6 rounded-xl hover:bg-color5 transition-all cursor-pointer group" >          
            <a href="atendimento.html">
            <div
              class="bg-color5 text-on-tertiary w-12 h-12 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
              <span
                class="material-symbols-outlined"
                style="font-variation-settings: &quot;FILL&quot; 1"
                >ac_unit</span
              >
            </div>
            <span class="font-headline font-bold text-on-tertiary-fixed"
              >Serviço</span
            >
            </a>
          </div>
          <!-- clientes Service -->
          <div
            class="bg-color1 p-6 rounded-xl hover:bg-color5 transition-all cursor-pointer group"
          >
          <a href="listaCliente.html">
            <div
              class="bg-color5 text-black w-12 h-12 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
            >
              <span
                class="material-symbols-outlined"
                style="font-variation-settings: &quot;FILL&quot; 1"
                >bolt</span
              >
            </div>
            <span class="font-headline font-bold text-on-secondary-fixed"
              >Clientes</span
            >
          </a>
          </div>
          <!-- Maintenance -->
          <div
            class="bg-gren p-6 rounded-xl hover:bg-color5 transition-all cursor-pointer group"
          >
          <a href="../inventario/Inventario.html">
            <div
              class="bg-color5 text-surface-container-lowest w-12 h-12 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
            >
              <span
                class="material-symbols-outlined"
                style="font-variation-settings: &quot;FILL&quot; 1"
                >box</span
              >
            </div>
            <span class="font-headline font-bold text-on-surface"
              >Inventario</span
            >
          </a>
          </div>
          <!-- perfil -->
          <div
            class="bg-orange p-6 rounded-xl hover:bg-color5 transition-all cursor-pointer group"
          >
          <a href="../perfil/perfil.html">
            <div
              class="bg-color5 text-on-error w-12 h-12 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
            >
            
              <span
                class="material-symbols-outlined"
                style="font-variation-settings: &quot;FILL&quot; 1"
                >tag</span
              >
            </div>
            <span class="font-headline font-bold text-on-error-container"
              >Perfil</span
            >
          </a>
          </div>
        </div>
      </section>
        <!-- Recent Promos Carousel (Featured Card) -->
        <!-- <div
          class="bg-primary-container rounded-xl p-8 text-on-primary-container relative overflow-hidden flex flex-col justify-between min-h-[320px]"
        >
          <div class="relative z-10">
            <span
              class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold tracking-widest uppercase mb-4 inline-block"
              ></span
            >
            <h4
              class="font-headline text-3xl font-extrabold mb-4 leading-tight"
            >
              <br />
            </h4>
            <p class="text-white/80 max-w-xs mb-6">
              
            </p>
          </div>-->
    <!-- BottomNavBar -->
    <nav
      class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-t-3xl border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_24px_rgba(0,0,0,0.06)] z-50"
    >
      <a
        class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-xl px-4 py-2 transition-all Active: translate-y-[-2px] duration-200"
        href="home.html"
      >
        <span class="material-symbols-outlined mb-1">select</span>
        <span class="Manrope font-bold text-[11px] uppercase tracking-widest"
          >Home</span
        >
      </a>
      <a
        class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-blue-600 dark:hover:text-blue-300 transition-all"
        href="atendimento.html"
      >
        <span class="material-symbols-outlined mb-1">handyman</span>
        <span class="Manrope font-bold text-[11px] uppercase tracking-widest"
          >Serviço</span
        >
      </a>
      <a
        class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-blue-600 dark:hover:text-blue-300 transition-all"
        href="../inventario/Inventario.html"
      >
        <span class="material-symbols-outlined mb-1">box</span>
        <span class="Manrope font-bold text-[11px] uppercase tracking-widest"
          >inventario</span
        >
      </a>
      <a
        class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-blue-600 dark:hover:text-blue-300 transition-all"
        href="../perfil/perfil.html"
      >
        <span class="material-symbols-outlined mb-1">person</span>
        <span class="Manrope font-bold text-[11px] uppercase tracking-widest"
          >Perfil</span
        >
      </a>
    </nav>
    <!-- FAB -->
    <div>
      <a href="../home/addService.html">
      <button
        class="fixed right-6 bottom-28 bg-color5 from-primary to-primary-container text-on-primary w-14 h-14 rounded-xl shadow-lg flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-40"
      >
        <span class="material-symbols-outlined text-3xl">add</span>
      </button>
      </a>
