<body class="bg-background text-on-background font-body min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm shadow-blue-900/5 flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors active:scale-95">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="font-inter headline-md font-bold text-slate-900 dark:text-slate-100">Add Customer</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Professional technician profile photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuANZm1jTE6Ps4OqhJdvXhXbF9jvkOPe3QVyIu35RvBuEQ40sdm0xP_1CCsIAkSzB4QDZdXXe6phWBOsXBnZwLrO_pSPGWnUk9mll5SWu6Lv09s0CgyCzJEU_9SUiBBS-oA2GPnJSHCBDsUHekCBg9IHN2k5BTsjMPQAFI_Su7QUiKpq__QD42Olf8_g-RYz2tKtQ018Eg7-sbebxjK3IrZJ9SVdMoYSFMmVkBWnrDXYqEQp2ft1JQiomf3rjomS6dSiTPmqcV7pmEY"/>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<div class="space-y-8">
<!-- Form Card Section -->
<section class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_4px_12px_rgba(13,28,47,0.04)] ghost-border">
<div class="flex items-center gap-3 mb-8">
<div class="w-1.5 h-8 thermal-gradient rounded-full"></div>
<h2 class="text-on-surface font-headline font-semibold text-xl tracking-tight">Customer Details</h2>
</div>
<form class="space-y-6">
<!-- Name Input -->
<div class="space-y-2">
<label class="block font-label text-xs font-medium text-on-surface-variant uppercase tracking-wider ml-1">Full Name / Company Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3.5 text-body-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all" placeholder="e.g. Arctic Logistics Inc." type="text"/>
</div>
</div>
<!-- Address Input -->
<div class="space-y-2">
<label class="block font-label text-xs font-medium text-on-surface-variant uppercase tracking-wider ml-1">Service Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">location_on</span>
<input class="w-full bg-surface-container-low border-none rounded-lg pl-11 pr-4 py-3.5 text-body-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all" placeholder="123 Cold Storage Way, Suite 400" type="text"/>
</div>
</div>
<!-- Grid for Phone and Email -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block font-label text-xs font-medium text-on-surface-variant uppercase tracking-wider ml-1">Contact Phone</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">phone</span>
<input class="w-full bg-surface-container-low border-none rounded-lg pl-11 pr-4 py-3.5 text-body-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all" placeholder="(555) 012-3456" type="tel"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label text-xs font-medium text-on-surface-variant uppercase tracking-wider ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-lg pl-11 pr-4 py-3.5 text-body-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all" placeholder="contact@company.com" type="email"/>
</div>
</div>
</div>
<!-- Notes Section -->
<div class="space-y-2">
<label class="block font-label text-xs font-medium text-on-surface-variant uppercase tracking-wider ml-1">Technician Notes</label>
<div class="relative group">
<textarea class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3.5 text-body-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all resize-none" placeholder="Mention site-specific safety protocols or preferred entry points..." rows="4"></textarea>
</div>
</div>
</form>
</section>
<!-- Decorative Visual: Diagnostic Pulse -->
<div class="flex items-center gap-4 px-2">
<div class="flex-1 h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full thermal-gradient w-1/3 rounded-full opacity-30"></div>
</div>
<span class="text-[10px] font-bold text-outline-variant uppercase tracking-[0.2em]">Data Integrity Check</span>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row-reverse gap-4 pt-4">
<button class="thermal-gradient text-white px-8 py-4 rounded-lg font-semibold text-base shadow-lg shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-2 flex-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                    Save Customer
                </button>
<button class="bg-surface-container-high text-primary px-8 py-4 rounded-lg font-semibold text-base hover:bg-surface-container-highest active:scale-95 transition-all flex-1">
                    Cancel
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed for transactional screen logic but template provided for consistency) -->
<!-- Logic: Suppressed as per 'The Destination Rule' for Transactional/Focused journeys -->
<!-- Status Chip Mockup (Floating visual indicator) -->
<div class="fixed bottom-8 right-8 z-40 hidden md:block">
<div class="bg-inverse-surface text-inverse-on-surface px-4 py-2 rounded-full shadow-xl flex items-center gap-2 text-sm font-medium">
<span class="w-2 h-2 rounded-full bg-tertiary-fixed animate-pulse"></span>
            Cloud Sync Active
        </div>
</div>
