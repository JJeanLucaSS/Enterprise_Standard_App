<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#6bd8cb",
              "on-surface": "#0d1c2f",
              "surface-container-highest": "#d5e3fd",
              "primary": "#00478d",
              "on-primary-fixed": "#001b3d",
              "surface-container": "#e6eeff",
              "outline": "#727783",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "on-surface-variant": "#424752",
              "on-tertiary-container": "#7fecde",
              "surface-variant": "#d5e3fd",
              "on-tertiary-fixed-variant": "#005049",
              "on-secondary": "#ffffff",
              "surface-bright": "#f8f9ff",
              "primary-container": "#005eb8",
              "on-error": "#ffffff",
              "primary-fixed-dim": "#a9c7ff",
              "primary-fixed": "#d6e3ff",
              "inverse-on-surface": "#ebf1ff",
              "tertiary-fixed": "#89f5e7",
              "on-secondary-fixed-variant": "#3a485b",
              "background": "#f8f9ff",
              "secondary-container": "#d5e3fc",
              "secondary-fixed-dim": "#b9c7df",
              "on-error-container": "#93000a",
              "on-background": "#0d1c2f",
              "surface-container-low": "#eff4ff",
              "tertiary-container": "#006b62",
              "surface": "#f8f9ff",
              "surface-tint": "#005db6",
              "outline-variant": "#c2c6d4",
              "surface-dim": "#ccdbf4",
              "secondary": "#515f74",
              "on-primary-container": "#c8daff",
              "inverse-surface": "#233144",
              "secondary-fixed": "#d5e3fc",
              "inverse-primary": "#a9c7ff",
              "on-tertiary-fixed": "#00201d",
              "surface-container-high": "#dde9ff",
              "on-primary-fixed-variant": "#00468c",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "tertiary": "#00514a",
              "on-secondary-fixed": "#0d1c2e",
              "error": "#ba1a1a",
              "on-secondary-container": "#57657a"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.25rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-mesh {
            background-image: radial-gradient(circle, #dde9ff 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface antialiased min-h-screen pb-32">
<!-- TopAppBar Section -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none">
<div class="flex items-center justify-between px-4 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-blue-50 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-blue-700" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-lg font-bold text-on-surface">Customer Signature</h1>
</div>
<div class="hidden md:block">
<span class="text-xl font-bold text-blue-800">Arctic Flow</span>
</div>
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-px"></div>
</header>
<main class="pt-20 px-4 max-w-lg mx-auto space-y-6">
<!-- Technician Info Cluster -->
<section class="mt-4 space-y-1">
<div class="flex justify-between items-end">
<div>
<p class="label-md text-on-surface-variant font-medium text-[0.75rem] uppercase tracking-wider">Lead Technician</p>
<h2 class="font-headline font-bold text-primary text-xl">Marcus Sterling</h2>
</div>
<div class="text-right">
<p class="label-md text-on-surface-variant font-medium text-[0.75rem] uppercase tracking-wider">Service Order</p>
<p class="font-headline font-bold text-on-surface">#OS-88291-B</p>
</div>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-3/4"></div>
</div>
</section>
<!-- Signature Pad Section -->
<section class="space-y-4">
<div class="relative group">
<div class="absolute -inset-0.5 bg-gradient-to-tr from-primary/10 to-transparent rounded-xl blur opacity-30 group-focus-within:opacity-100 transition duration-500"></div>
<div class="relative bg-surface-container-lowest border border-outline-variant/30 rounded-xl overflow-hidden shadow-sm">
<div class="p-4 flex justify-between items-center border-b border-surface-container-low">
<span class="text-sm font-semibold text-primary/80 flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
                            Sign here
                        </span>
<div class="flex gap-2">
<button class="px-3 py-1.5 rounded-lg text-xs font-bold text-secondary hover:bg-surface-container transition-colors flex items-center gap-1 active:scale-95 duration-150">
<span class="material-symbols-outlined text-sm" data-icon="undo">undo</span>
                                Undo
                            </button>
<button class="px-3 py-1.5 rounded-lg text-xs font-bold text-error hover:bg-error-container/20 transition-colors flex items-center gap-1 active:scale-95 duration-150">
<span class="material-symbols-outlined text-sm" data-icon="delete_sweep">delete_sweep</span>
                                Clear
                            </button>
</div>
</div>
<!-- Canvas Area -->
<div class="h-64 w-full bg-white signature-mesh relative cursor-crosshair">
<!-- Simulated signature for visual context -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-5">
<span class="material-symbols-outlined text-9xl" data-icon="gesture">gesture</span>
</div>
</div>
</div>
</div>
<p class="text-center text-xs text-on-surface-variant italic">Please use your finger or a stylus to sign inside the box.</p>
</section>
<!-- Bento Style Details Card -->
<div class="grid grid-cols-2 gap-3">
<div class="bg-surface-container-low p-4 rounded-xl">
<span class="material-symbols-outlined text-primary mb-2" data-icon="calendar_today">calendar_today</span>
<p class="text-[0.7rem] uppercase font-bold text-on-surface-variant">Date</p>
<p class="font-bold text-on-surface">Oct 24, 2023</p>
</div>
<div class="bg-surface-container-low p-4 rounded-xl">
<span class="material-symbols-outlined text-primary mb-2" data-icon="schedule">schedule</span>
<p class="text-[0.7rem] uppercase font-bold text-on-surface-variant">Arrival Time</p>
<p class="font-bold text-on-surface">09:15 AM</p>
</div>
</div>
<!-- Confirmation Section -->
<section class="space-y-6 pt-4">
<label class="flex items-start gap-3 cursor-pointer group">
<div class="relative flex items-center pt-0.5">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" type="checkbox"/>
</div>
<div class="flex flex-col">
<span class="text-sm font-medium text-on-surface group-hover:text-primary transition-colors">I agree to the terms and service summary</span>
<span class="text-xs text-on-surface-variant">Reviewing the digital service report and acknowledging completion of Arctic Flow refrigeration maintenance.</span>
</div>
</label>
<!-- Bottom Action -->
<div class="space-y-3">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white py-4 rounded-xl font-bold shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-95 transition-transform duration-150">
                    Confirm &amp; Finish Job
                    <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
</button>
<button class="w-full py-3 text-sm font-bold text-primary hover:bg-primary/5 rounded-xl transition-colors">
                    Back to Job Summary
                </button>
</div>
</section>
</main>
<!-- Bottom Navigation Shell (Suppressed for transactional focus per mandate, but keeping placeholder space) -->
<div class="fixed bottom-0 left-0 w-full h-20 bg-gradient-to-t from-background to-transparent pointer-events-none"></div>
<!-- Success Modal Shadowing (Design Detail) -->
<div class="fixed inset-x-4 bottom-8 flex justify-center pointer-events-none">
<div class="bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 opacity-0 translate-y-4">
<span class="material-symbols-outlined text-tertiary-fixed" data-icon="verified">verified</span>
<span class="text-sm font-medium">Signature Captured</span>
</div>
</div>
</body></html>
